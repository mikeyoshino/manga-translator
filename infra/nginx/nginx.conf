# All traffic — wunplae.com (+ www redirect)
server {
    listen 80;
    server_name wunplae.com www.wunplae.com;
    client_max_body_size 50M;

    location / {
        proxy_pass http://front:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api:5003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /payment/webhook {
        proxy_pass http://api:5003/payment/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Redirect old subdomains to wunplae.com
server {
    listen 80;
    server_name secure.wunplae.com studio.wunplae.com;
    return 301 https://wunplae.com$request_uri;
}

# CRM admin panel — crm.wunplae.com
server {
    listen 80;
    server_name crm.wunplae.com;
    client_max_body_size 50M;

    location / {
        proxy_pass http://crm:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api:5003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}

# Fallback — block direct IP access and unknown hosts
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
