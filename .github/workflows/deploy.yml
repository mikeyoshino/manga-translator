name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'front/**'
      - 'docker-compose.yml'
      - 'Dockerfile.api'
      - 'Dockerfile.runpod'
      - 'nginx.conf'
      - 'requirements-api.txt'
      - 'requirements.txt'
  workflow_dispatch:  # manual trigger

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  FRONT_IMAGE: ghcr.io/${{ github.repository }}/front
  RUNPOD_IMAGE: ghcr.io/${{ github.repository }}/runpod-worker

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ env.API_IMAGE }}:latest,${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: front
          file: front/Dockerfile
          push: true
          tags: ${{ env.FRONT_IMAGE }}:latest,${{ env.FRONT_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push RunPod worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.runpod
          push: true
          tags: ${{ env.RUNPOD_IMAGE }}:latest,${{ env.RUNPOD_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-runpod:
    name: Deploy RunPod Worker
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Update RunPod template image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_TEMPLATE_ID: ${{ secrets.RUNPOD_TEMPLATE_ID }}
          NEW_IMAGE: ${{ env.RUNPOD_IMAGE }}:${{ github.sha }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os, sys

          api_key = os.environ["RUNPOD_API_KEY"]
          template_id = os.environ["RUNPOD_TEMPLATE_ID"]
          new_image = os.environ["NEW_IMAGE"]
          url = f"https://api.runpod.io/graphql?api_key={api_key}"

          def graphql(query):
              req = urllib.request.Request(url, data=json.dumps({"query": query}).encode(),
                  headers={"Content-Type": "application/json"})
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          # Fetch current template settings
          result = graphql("{ myself { endpoints { template { id name dockerArgs containerDiskInGb volumeInGb env { key value } } } } }")
          t = result["data"]["myself"]["endpoints"][0]["template"]
          print(f"Current template: {t['name']}, disk: {t['containerDiskInGb']}, vol: {t['volumeInGb']}, env vars: {len(t['env'])}")

          # Build env vars as GraphQL input (unquoted keys)
          env_items = ", ".join(f'{{ key: "{e["key"]}", value: "{e["value"]}" }}' for e in t["env"])
          env_gql = f"[{env_items}]"

          docker_args = t["dockerArgs"] or ""

          mutation = f'''mutation {{
            saveTemplate(input: {{
              id: "{template_id}",
              name: "{t['name']}",
              imageName: "{new_image}",
              dockerArgs: "{docker_args}",
              containerDiskInGb: {t['containerDiskInGb']},
              volumeInGb: {t['volumeInGb']},
              env: {env_gql}
            }}) {{ id imageName }}
          }}'''

          result = graphql(mutation)
          print(f"RunPod API response: {json.dumps(result)}")

          if "errors" in result:
              print("ERROR: RunPod API returned errors", file=sys.stderr)
              sys.exit(1)

          print(f"Successfully updated template image to: {new_image}")
          PYEOF

  deploy:
    name: Deploy to Contabo VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ~/manga-translator

            # Pull latest config files
            git pull origin main

            # Log in to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull api front

            # Restart services (no downtime for redis)
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -f

            # Verify health
            sleep 5
            curl -f http://localhost:5003/health || echo "WARNING: Health check failed"
