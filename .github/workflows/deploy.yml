name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'packages/shared/**'
      - 'services/**'
      - 'infra/**'
      - 'server/**'
      - 'front/**'
      - 'crm/**'
      - 'manga_translator/**'
      - 'requirements*.txt'
  workflow_dispatch:
    inputs:
      deploy_api:
        description: 'Deploy API'
        type: boolean
        default: false
      deploy_front:
        description: 'Deploy Frontend'
        type: boolean
        default: false
      deploy_worker:
        description: 'Deploy RunPod Worker'
        type: boolean
        default: false
      deploy_crm:
        description: 'Deploy CRM'
        type: boolean
        default: false
      deploy_all:
        description: 'Deploy ALL services'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  FRONT_IMAGE: ghcr.io/${{ github.repository }}/front
  NGINX_IMAGE: ghcr.io/${{ github.repository }}/nginx
  CRM_IMAGE: ghcr.io/${{ github.repository }}/crm
  RUNPOD_IMAGE: ghcr.io/${{ github.repository }}/runpod-worker

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      front: ${{ steps.changes.outputs.front }}
      nginx: ${{ steps.changes.outputs.nginx }}
      worker: ${{ steps.changes.outputs.worker }}
      crm: ${{ steps.changes.outputs.crm }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        run: |
          # Manual trigger — use inputs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ALL="${{ github.event.inputs.deploy_all }}"
            if [ "$DEPLOY_ALL" = "true" ]; then
              echo "api=true" >> $GITHUB_OUTPUT
              echo "front=true" >> $GITHUB_OUTPUT
              echo "nginx=true" >> $GITHUB_OUTPUT
              echo "worker=true" >> $GITHUB_OUTPUT
              echo "crm=true" >> $GITHUB_OUTPUT
            else
              echo "api=${{ github.event.inputs.deploy_api }}" >> $GITHUB_OUTPUT
              echo "front=${{ github.event.inputs.deploy_front }}" >> $GITHUB_OUTPUT
              echo "nginx=${{ github.event.inputs.deploy_api || github.event.inputs.deploy_front || github.event.inputs.deploy_crm }}" >> $GITHUB_OUTPUT
              echo "worker=${{ github.event.inputs.deploy_worker }}" >> $GITHUB_OUTPUT
              echo "crm=${{ github.event.inputs.deploy_crm }}" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Push trigger — detect from changed files
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          API=false
          FRONT=false
          NGINX=false
          WORKER=false
          CRM=false

          # Shared package changes affect API and Worker
          if echo "$CHANGED" | grep -qE '^packages/shared/'; then
            API=true
            WORKER=true
          fi

          # API: services/api/**, server/**, legacy Dockerfile.api/requirements-api.txt (transition)
          if echo "$CHANGED" | grep -qE '^(services/api/|server/|Dockerfile\.api|requirements-api\.txt|manga_translator/config\.py)'; then
            API=true
          fi

          # Frontend: front/**, services/front/**
          if echo "$CHANGED" | grep -qE '^(front/|services/front/)'; then
            FRONT=true
          fi

          # Nginx: infra/nginx/**, nginx.conf
          if echo "$CHANGED" | grep -qE '^(infra/nginx/|nginx\.conf)'; then
            NGINX=true
          fi

          # CRM: crm/**, services/crm/**
          if echo "$CHANGED" | grep -qE '^(crm/|services/crm/)'; then
            CRM=true
            NGINX=true
          fi

          # Worker: services/worker/**, Dockerfile.runpod, requirements.txt, manga_translator/**
          if echo "$CHANGED" | grep -qE '^(services/worker/|Dockerfile\.runpod|requirements\.txt|manga_translator/|server/runpod_handler\.py|server/smart_routing\.py)'; then
            WORKER=true
          fi

          # Shared files that affect everything
          if echo "$CHANGED" | grep -qE '^(infra/docker-compose|docker-compose)'; then
            API=true
            FRONT=true
            NGINX=true
            WORKER=true
            CRM=true
          fi

          echo "api=$API" >> $GITHUB_OUTPUT
          echo "front=$FRONT" >> $GITHUB_OUTPUT
          echo "nginx=$NGINX" >> $GITHUB_OUTPUT
          echo "worker=$WORKER" >> $GITHUB_OUTPUT
          echo "crm=$CRM" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build & Push Images
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.front == 'true' || needs.detect-changes.outputs.nginx == 'true' || needs.detect-changes.outputs.worker == 'true' || needs.detect-changes.outputs.crm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        if: needs.detect-changes.outputs.api == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:latest,${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        if: needs.detect-changes.outputs.front == 'true'
        uses: docker/build-push-action@v5
        with:
          context: front
          file: front/Dockerfile
          push: true
          tags: ${{ env.FRONT_IMAGE }}:latest,${{ env.FRONT_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_SECURE_HOST=${{ secrets.VITE_SECURE_HOST }}
            VITE_STUDIO_HOST=${{ secrets.VITE_STUDIO_HOST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Nginx image
        if: needs.detect-changes.outputs.nginx == 'true'
        uses: docker/build-push-action@v5
        with:
          context: infra/nginx
          file: infra/nginx/Dockerfile
          push: true
          tags: ${{ env.NGINX_IMAGE }}:latest,${{ env.NGINX_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CRM image
        if: needs.detect-changes.outputs.crm == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/crm/Dockerfile
          push: true
          tags: ${{ env.CRM_IMAGE }}:latest,${{ env.CRM_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push RunPod worker image
        if: needs.detect-changes.outputs.worker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/worker/Dockerfile.runpod
          push: true
          tags: ${{ env.RUNPOD_IMAGE }}:latest,${{ env.RUNPOD_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-runpod:
    name: Deploy RunPod Worker
    needs: [detect-changes, build-and-push]
    if: always() && needs.detect-changes.outputs.worker == 'true' && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch current RunPod template
        id: fetch-template
        run: |
          CURRENT=$(curl -s -X POST "https://api.runpod.io/graphql?api_key=${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "{ myself { endpoints { template { id name dockerArgs containerDiskInGb volumeInGb env { key value } } } } }"}')
          echo "current_template=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Update RunPod template image
        run: |
          python3 -c "
          import json, os

          current = json.loads(os.environ['CURRENT_TEMPLATE'])
          t = current['data']['myself']['endpoints'][0]['template']
          print(f\"Current: {t['name']}, disk: {t['containerDiskInGb']}, vol: {t['volumeInGb']}, env: {len(t['env'])}\")

          env_items = ', '.join(f'{{ key: \"{e[\"key\"]}\", value: \"{e[\"value\"]}\" }}' for e in t['env'])
          docker_args = t['dockerArgs'] or ''
          new_image = os.environ['NEW_IMAGE']
          template_id = os.environ['TEMPLATE_ID']

          mutation = f'mutation {{ saveTemplate(input: {{ id: \"{template_id}\", name: \"{t[\"name\"]}\", imageName: \"{new_image}\", dockerArgs: \"{docker_args}\", containerDiskInGb: {t[\"containerDiskInGb\"]}, volumeInGb: {t[\"volumeInGb\"]}, env: [{env_items}] }}) {{ id imageName }} }}'
          payload = json.dumps({'query': mutation})
          with open('mutation.json', 'w') as f:
              f.write(payload)
          "
          RESPONSE=$(curl -s -X POST "https://api.runpod.io/graphql?api_key=${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @mutation.json)
          echo "RunPod API response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "ERROR: RunPod API returned errors"
            exit 1
          fi
        env:
          CURRENT_TEMPLATE: ${{ steps.fetch-template.outputs.current_template }}
          NEW_IMAGE: ${{ env.RUNPOD_IMAGE }}:${{ github.sha }}
          TEMPLATE_ID: ${{ secrets.RUNPOD_TEMPLATE_ID }}

  deploy:
    name: Deploy to Contabo VPS
    needs: [detect-changes, build-and-push]
    if: always() && (needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.front == 'true' || needs.detect-changes.outputs.nginx == 'true' || needs.detect-changes.outputs.crm == 'true') && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ~/manga-translator

            # Pull latest config files
            git pull origin main

            # Log in to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull only changed images
            PULL_SERVICES=""
            if [ "${{ needs.detect-changes.outputs.api }}" = "true" ]; then
              PULL_SERVICES="$PULL_SERVICES api"
            fi
            if [ "${{ needs.detect-changes.outputs.front }}" = "true" ]; then
              PULL_SERVICES="$PULL_SERVICES front"
            fi
            if [ "${{ needs.detect-changes.outputs.nginx }}" = "true" ]; then
              PULL_SERVICES="$PULL_SERVICES nginx"
            fi
            if [ "${{ needs.detect-changes.outputs.crm }}" = "true" ]; then
              PULL_SERVICES="$PULL_SERVICES crm"
            fi

            if [ -n "$PULL_SERVICES" ]; then
              docker compose -f infra/docker-compose.prod.yml pull $PULL_SERVICES
              docker compose -f infra/docker-compose.prod.yml up -d --force-recreate $PULL_SERVICES

              # Restart nginx so it resolves the new container IPs
              docker compose -f infra/docker-compose.prod.yml restart nginx
            fi

            # Clean up old images
            docker image prune -f

            # Verify health
            sleep 5
            curl -f http://localhost:5003/health || echo "WARNING: Health check failed"
