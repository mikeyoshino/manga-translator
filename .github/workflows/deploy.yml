name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'front/**'
      - 'docker-compose.yml'
      - 'Dockerfile.api'
      - 'Dockerfile.runpod'
      - 'nginx.conf'
      - 'requirements-api.txt'
      - 'requirements.txt'
  workflow_dispatch:  # manual trigger

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  FRONT_IMAGE: ghcr.io/${{ github.repository }}/front
  RUNPOD_IMAGE: ghcr.io/${{ github.repository }}/runpod-worker

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ env.API_IMAGE }}:latest,${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: front
          file: front/Dockerfile
          push: true
          tags: ${{ env.FRONT_IMAGE }}:latest,${{ env.FRONT_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push RunPod worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.runpod
          push: true
          tags: ${{ env.RUNPOD_IMAGE }}:latest,${{ env.RUNPOD_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-runpod:
    name: Deploy RunPod Worker
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RunPod release
        run: |
          RESPONSE=$(curl -s -X POST "https://api.runpod.io/graphql?api_key=${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { saveEndpoint(input: { id: \"${{ secrets.RUNPOD_ENDPOINT_ID }}\", imageName: \"${{ env.RUNPOD_IMAGE }}:${{ github.sha }}\" }) { id imageName } }"
            }')
          echo "RunPod API response: $RESPONSE"
          # Fail if response contains errors
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "ERROR: RunPod API returned errors"
            exit 1
          fi

  deploy:
    name: Deploy to Contabo VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ~/manga-translator

            # Pull latest config files
            git pull origin main

            # Log in to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull api front

            # Restart services (no downtime for redis)
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -f

            # Verify health
            sleep 5
            curl -f http://localhost:5003/health || echo "WARNING: Health check failed"
